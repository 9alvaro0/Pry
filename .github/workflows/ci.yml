name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (iOS)
    runs-on: macos-15
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        destination:
          - 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -scheme Pry

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Pry \
            -destination "${{ matrix.destination }}" \
            CODE_SIGNING_ALLOWED=NO \
            | tail -50

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Pry \
            -destination "${{ matrix.destination }}" \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
